<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lisculpt — Sculpture Portfolio Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind = { config: {
      theme: {
        extend: {
          fontFamily: {
            display: ["Cormorant Garamond", "serif"],
            ui: ["Syne", "sans-serif"],
          },
          colors: {
            parchment: "#F2EFE9",
            ink:       "#0D0D0D",
            stone:     "#7A7770",
            fog:       "#C8C5BF",
            warm:      "#E8E4DC",
          }
        }
      }
    }};
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="stylesheet" href="style.css" />

  <script type="application/ld+json" id="page-jsonld">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Lisculpt",
    "description": "An international directory of contemporary sculptors and their work.",
    "url": "https://lisculpt.app"
  }
  </script>
</head>

<body>

  <!-- ╔══════════════════════════════════════╗ -->
  <!-- ║            NAVIGATION               ║ -->
  <!-- ╚══════════════════════════════════════╝ -->
  <header id="site-header"
          class="fixed top-0 left-0 right-0 z-50 bg-parchment/92 backdrop-blur-md"
          style="border-bottom: 1px solid #C8C5BF;">
    <div class="max-w-screen-2xl mx-auto px-6 h-[52px] flex items-center justify-between">

      <button onclick="navigate('/')"
              class="font-display text-[1.55rem] font-light tracking-[0.18em] text-ink leading-none">
        Lisculpt
      </button>

      <nav class="flex items-center gap-8">
        <button onclick="navigate('/')" class="nav-link">Gallery</button>
        <button onclick="scrollToArtists()" class="nav-link">Artists</button>
        <button class="nav-link">About</button>
        <button class="nav-link border border-ink px-5 py-2 text-ink hover:bg-ink hover:text-parchment transition-colors duration-200"
                style="color: #0D0D0D; border-color: #0D0D0D;">
          Submit Work
        </button>
      </nav>

    </div>
  </header>


  <!-- ╔══════════════════════════════════════╗ -->
  <!-- ║             HOME VIEW               ║ -->
  <!-- ╚══════════════════════════════════════╝ -->

    <!-- Featured Hero -->
    <section class="relative" style="padding-top: 52px;">
      <div class="relative">
        <img id="hero-img" src="" alt="" class="hero-img" onerror="onImgError(this)" />

        <!-- Bottom overlay -->
        <div class="absolute inset-0 flex flex-col justify-end"
             style="padding: 3rem 2.5rem 3.5rem;">
          <div class="max-w-screen-2xl mx-auto w-full">

            <div class="mb-3 fade-up">
              <span style="font-family:'Syne',sans-serif; font-size:0.65rem; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.5);">
                Featured Sculptor
              </span>
            </div>

            <div class="flex items-end justify-between gap-8">
              <div>
                <h1 id="hero-name"
                    class="font-display text-white font-light leading-none mb-2 fade-up-1"
                    style="font-size: clamp(3.5rem, 9vw, 8rem);">
                </h1>
                <p id="hero-location"
                   class="fade-up-2"
                   style="font-family:'Syne',sans-serif; font-size:0.72rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.55);">
                </p>
              </div>

              <button id="hero-cta"

                      onmouseout="this.style.background='transparent'">

            </div>

            <div id="hero-tags" class="flex gap-2 mt-5 fade-up-3"></div>

          </div>
        </div>
      </div>
    </section>


    <!-- Filter Bar -->
    <div id="filter-bar"
         class="sticky z-40 bg-parchment/95 backdrop-blur-md scroll-hide"
         style="top: 52px; border-bottom: 1px solid #C8C5BF;">
      <div class="px-6 py-2.5 flex items-center gap-5 w-max min-w-full">

        <span id="result-count"
              style="font-family:'Syne',sans-serif; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; color:#7A7770; white-space:nowrap; flex-shrink:0;">
        </span>

        <div class="vdivider" style="height:16px;"></div>

        <div class="flex items-center gap-2.5" style="flex-shrink:0;">
          <span style="font-family:'Syne',sans-serif; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:#7A7770; flex-shrink:0;">Material</span>
          <div id="filter-material" class="flex gap-1.5"></div>
        </div>

        <div class="vdivider" style="height:16px;"></div>

        <div class="flex items-center gap-2.5" style="flex-shrink:0;">
          <span style="font-family:'Syne',sans-serif; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:#7A7770; flex-shrink:0;">Country</span>
          <div id="filter-country" class="flex gap-1.5"></div>
        </div>

        <div class="vdivider" style="height:16px;"></div>

        <div class="flex items-center gap-2.5" style="flex-shrink:0;">
          <span style="font-family:'Syne',sans-serif; font-size:0.6rem; letter-spacing:0.15em; text-transform:uppercase; color:#7A7770; flex-shrink:0;">Style</span>
          <div id="filter-style" class="flex gap-1.5"></div>

      </div>
    </div>


    <!-- Masonry Grid -->

      <div id="artwork-grid" class="masonry"></div>
      <div id="no-results"

      </div>

  <!-- ╔══════════════════════════════════════╗ -->
  <!-- ║          DATA + APPLICATION         ║ -->
  <!-- ╚══════════════════════════════════════╝ -->
  <script>

  // ──────────────────────────────────────────
  // SCHEMA.ORG JSON-LD
  // ──────────────────────────────────────────
  const SITE_URL = window.location.origin;

  function setPageJsonLd(data) {
    document.getElementById('page-jsonld').textContent = JSON.stringify(data, null, 2);
  }

  function setHomJsonLd() {
    setPageJsonLd({
      '@context': 'https://schema.org',
      '@type': 'WebSite',
      name: 'Lisculpt',
      description: 'An international directory of contemporary sculptors and their work.',
      url: SITE_URL
    });
  }

  function setArtistJsonLd(artist) {
    const sameAs = [artist.instagram].filter(Boolean);
    if (artist.wikidata_qid) sameAs.push('https://www.wikidata.org/wiki/' + artist.wikidata_qid);
    if (artist.ulan_id)      sameAs.push('https://vocab.getty.edu/ulan/' + artist.ulan_id);
    if (artist.viaf_id)      sameAs.push('https://viaf.org/viaf/' + artist.viaf_id);

    const personNode = {
      '@type': 'Person',
      '@id': SITE_URL + '/#artist-' + artist.id,
      name: artist.name,
      url: SITE_URL + '/#/artist/' + artist.id,
      description: artist.bio,
      sameAs: sameAs.length ? sameAs : undefined
    };
    if (artist.nationality)  personNode.nationality = artist.nationality;
    if (artist.birth_year)   personNode.birthDate   = String(artist.birth_year);
    if (artist.death_year)   personNode.deathDate   = String(artist.death_year);

    const artworkNodes = artist.artworks.map(w => {
      const node = {
        '@type': 'VisualArtwork',
        name: w.title,
        artform: w.object_type_aat_uri || 'Sculpture',
        artMedium: w.material,
        dateCreated: String(w.year),
        image: w.image,
        url: SITE_URL + '/#/artist/' + artist.id,
        creator: { '@id': SITE_URL + '/#artist-' + artist.id }
      };
      if (w.material_aat_uri) node.material = w.material_aat_uri;
      if (w.edition_size)     node.artEdition = String(w.edition_size);
      if (w.width_cm)  node.width  = { '@type': 'Distance', name: w.width_cm  + ' cm' };
      if (w.height_cm) node.height = { '@type': 'Distance', name: w.height_cm + ' cm' };
      if (w.depth_cm)  node.depth  = { '@type': 'Distance', name: w.depth_cm  + ' cm' };
      const extra = [];
      if (w.edition_number) extra.push({ '@type': 'PropertyValue', name: 'edition_number', value: w.edition_number });
      if (w.foundry)        extra.push({ '@type': 'PropertyValue', name: 'foundry',        value: w.foundry });
      if (w.cast_date)      extra.push({ '@type': 'PropertyValue', name: 'cast_date',      value: String(w.cast_date) });
      if (w.patination)     extra.push({ '@type': 'PropertyValue', name: 'patination',     value: w.patination });
      if (extra.length) node.additionalProperty = extra;
      return node;
    });

    setPageJsonLd({
      '@context': 'https://schema.org',
      '@graph': [personNode, ...artworkNodes]
    });
  }

  function setArtworkJsonLd(artist, artwork) {
    const node = {
      '@context': 'https://schema.org',
      '@type': 'VisualArtwork',
      name: artwork.title,
      artform: artwork.object_type_aat_uri || 'Sculpture',
      artMedium: artwork.material,
      dateCreated: String(artwork.year),
      image: artwork.image,
      description: artwork.description || undefined,
      url: SITE_URL + '/#/artist/' + artist.id + '/' + slugify(artwork.title),
      creator: {
        '@type': 'Person',
        '@id': SITE_URL + '/#artist-' + artist.id,
        name: artist.name
      }
    };
    if (artwork.material_aat_uri)  node.material   = artwork.material_aat_uri;
    if (artwork.technique_aat_uri) node.technique  = artwork.technique_aat_uri;
    if (artwork.edition_size)      node.artEdition = String(artwork.edition_size);
    if (artwork.width_cm)  node.width  = { '@type': 'Distance', name: artwork.width_cm  + ' cm' };
    if (artwork.height_cm) node.height = { '@type': 'Distance', name: artwork.height_cm + ' cm' };
    if (artwork.depth_cm)  node.depth  = { '@type': 'Distance', name: artwork.depth_cm  + ' cm' };

    const extra = [];
    if (artwork.edition_number) extra.push({ '@type': 'PropertyValue', name: 'edition_number', value: artwork.edition_number });
    if (artwork.foundry)        extra.push({ '@type': 'PropertyValue', name: 'foundry',        value: artwork.foundry });
    if (artwork.cast_date)      extra.push({ '@type': 'PropertyValue', name: 'cast_date',      value: String(artwork.cast_date) });
    if (artwork.patination)     extra.push({ '@type': 'PropertyValue', name: 'patination',     value: artwork.patination });
    if (extra.length) node.additionalProperty = extra;

    setPageJsonLd(node);
  }

  // ──────────────────────────────────────────
  // ARTWORK TAXONOMY INFOBOX
  // ──────────────────────────────────────────
  // Known Getty AAT labels (for friendly display; falls back to the raw id).
  const AAT_LABELS = {
    '300047090': 'sculpture',
    '300053917': 'lost-wax casting',
    '300010957': 'bronze',
    '300010439': 'clay',
    '300011443': 'marble',
    '300011176': 'stone',
    '300010660': 'ceramics',
    '300011914': 'wood',
    '300010797': 'glass'
  };
  function aatId(uri)   { const m = /(\d+)\s*$/.exec(uri || ''); return m ? m[1] : ''; }
  function aatLabel(uri){ const id = aatId(uri); return AAT_LABELS[id] || null; }
  function aatLink(uri, text) {
    if (!uri) return '';
    const label = text || aatLabel(uri) || ('AAT ' + aatId(uri));
    return `<a href="${uri}" target="_blank" rel="noopener noreferrer" ` +
           `style="color:inherit;text-decoration:underline;text-decoration-color:#C8C5BF;text-underline-offset:2px;">` +
           `${label}<span style="font-size:0.7em;opacity:0.6;"> ↗</span></a>`;
  }

  function renderArtworkInfobox(artist, artwork) {
    const w = artwork;
    const rows = [];
    const add = (label, value) => { if (value !== null && value !== undefined && value !== '') rows.push([label, value]); };

    // Object type (label from AAT, linked)
    if (w.object_type_aat_uri) {
      const lbl = aatLabel(w.object_type_aat_uri) || 'Sculpture';
      add('Type', aatLink(w.object_type_aat_uri, lbl.charAt(0).toUpperCase() + lbl.slice(1)));
    }
    add('Artist', `<a href="#/artist/${artist.id}" style="color:inherit;text-decoration:underline;text-decoration-color:#C8C5BF;text-underline-offset:2px;">${artist.name}</a>`);
    add('Year', w.year);

    // Material — free-text label, with AAT crosswalk link if present
    if (w.material) {
      add('Material', w.material_aat_uri
        ? `${w.material} <span style="color:#7A7770;">· ${aatLink(w.material_aat_uri, 'AAT')}</span>`
        : w.material);
    }
    if (w.technique_aat_uri) add('Technique', aatLink(w.technique_aat_uri));
    if (w.style) add('Style', w.style);

    // Dimensions
    if (w.height_cm || w.width_cm || w.depth_cm) {
      const fmt = d => (d || d === 0) ? String(d) : '?';
      add('Dimensions', `${fmt(w.height_cm)} × ${fmt(w.width_cm)} × ${fmt(w.depth_cm)} cm <span style="color:#7A7770;">(h × w × d)</span>`);
    }
    if (w.weight_kg)      add('Weight', `${w.weight_kg} kg`);
    if (w.base_height_cm) add('Base height', `${w.base_height_cm} cm`);

    // Edition & casting
    if (w.edition_size || w.edition_number) {
      add('Edition', w.edition_number
        ? (w.edition_size ? `${w.edition_number} of ${w.edition_size}` : w.edition_number)
        : `Edition of ${w.edition_size}`);
    }
    add('Foundry',    w.foundry);
    add('Cast',       w.cast_date);
    add('Patination', w.patination);

    // Governance
    add('Location', w.location_country);
    add('License',  w.license);
    if (w.wikidata_qid) add('Wikidata', aatLink('https://www.wikidata.org/wiki/' + w.wikidata_qid, w.wikidata_qid));

    const box = document.getElementById('artwork-infobox');
    const body = rows.map(([label, value]) => `
      <tr style="border-top:1px solid #E8E4DC;">
        <th style="text-align:left;vertical-align:top;padding:0.5rem 0.75rem;font-family:'Syne',sans-serif;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:#7A7770;white-space:nowrap;font-weight:500;">${label}</th>
        <td style="padding:0.5rem 0.75rem;font-family:'Syne',sans-serif;font-size:0.85rem;color:#0D0D0D;">${value}</td>
      </tr>`).join('');
    box.innerHTML = `
      <div style="border:1px solid #C8C5BF;border-radius:6px;overflow:hidden;">
        <div style="background:#0D0D0D;color:#F2EFE9;padding:0.7rem 0.75rem;font-family:'Syne',sans-serif;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;">${w.title || 'Details'}</div>
        <table style="width:100%;border-collapse:collapse;">${body}</table>
      </div>`;
  }

  // ──────────────────────────────────────────
  // ARTWORK IMAGE GALLERY (hero + thumbnails)
  // ──────────────────────────────────────────
  let gallery = { images: [], index: 0, alt: '' };

  function initArtworkGallery(artwork) {
    const views = Array.isArray(artwork.views)
      ? artwork.views.filter(v => typeof v === 'string' && v) : [];
    const imgs = [artwork.image, ...views].filter(Boolean);
    gallery.images = [...new Set(imgs)];   // de-dup, preserve order
    gallery.index = 0;
    gallery.alt = artwork.title || '';

    const heroImg = document.getElementById('artwork-hero-img');
    if (!gallery.images.length) { heroImg.src = IMG_PLACEHOLDER; heroImg.alt = gallery.alt; }

    renderThumbs();
    setHeroImage(0);

    const multi = gallery.images.length > 1;
    document.getElementById('artwork-prev').style.display  = multi ? '' : 'none';
    document.getElementById('artwork-next').style.display  = multi ? '' : 'none';
    document.getElementById('artwork-thumbs').style.display = multi ? 'flex' : 'none';
  }

  function setHeroImage(i) {
    if (!gallery.images.length) return;
    const n = gallery.images.length;
    gallery.index = (i + n) % n;
    const heroImg = document.getElementById('artwork-hero-img');
    heroImg.src = gallery.images[gallery.index];
    heroImg.alt = gallery.alt + (n > 1 ? ` (${gallery.index + 1}/${n})` : '');
    document.querySelectorAll('#artwork-thumbs button')
      .forEach((b, idx) => b.classList.toggle('active', idx === gallery.index));
  }

  function galleryStep(d) { setHeroImage(gallery.index + d); }

  function renderThumbs() {
    document.getElementById('artwork-thumbs').innerHTML = gallery.images.map((src, i) =>
      `<button type="button" onclick="setHeroImage(${i})" aria-label="View image ${i + 1}">
         <img src="${src}" alt="" loading="lazy" onerror="onImgError(this)" />
       </button>`).join('');
  }

  // Arrow-key navigation while the artwork view is open
  window.addEventListener('keydown', (e) => {
    if (document.getElementById('view-artwork').classList.contains('hidden')) return;
    if (gallery.images.length < 2) return;
    if (e.key === 'ArrowLeft')  { galleryStep(-1); e.preventDefault(); }
    if (e.key === 'ArrowRight') { galleryStep(1);  e.preventDefault(); }
  });

  // ──────────────────────────────────────────
  // IMAGE PLACEHOLDER
  // ──────────────────────────────────────────
  const IMG_PLACEHOLDER = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">' +
    '<rect width="400" height="500" fill="#E8E4DC"/>' +
    '<rect x="160" y="190" width="80" height="60" rx="2" fill="none" stroke="#C8C5BF" stroke-width="1.5"/>' +
    '<circle cx="177" cy="208" r="9" fill="none" stroke="#C8C5BF" stroke-width="1.5"/>' +
    '<path d="M160 245 L185 222 L205 238 L222 226 L240 245" fill="none" stroke="#C8C5BF" stroke-width="1.5"/>' +
    '</svg>'
  );
  function onImgError(el) { el.src = IMG_PLACEHOLDER; }

  // ──────────────────────────────────────────
  // SUPABASE CLIENT
  // ──────────────────────────────────────────
  const SUPABASE_URL  = 'https://bhkggorcvcpnttbztdod.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoa2dnb3JjdmNwbnR0Ynp0ZG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDk1NzUsImV4cCI6MjA5ODEyNTU3NX0.UHv1ysY33NrIfxkF610TlHL47xcPdieX1F5eSfvsu-M';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  async function loadData() {
    const { data: artists, error: aErr } = await sb
      .from('artists')
      .select('*')
      .eq('published', true)
      .order('rating', { ascending: false });
    if (aErr) throw aErr;

    const { data: artworks, error: wErr } = await sb
      .from('artworks')
      .select('*, artists!inner(published)')
      .eq('artists.published', true);
    if (wErr) throw wErr;

    const artworksByArtist = {};
    for (const w of artworks) {
      (artworksByArtist[w.artist_id] = artworksByArtist[w.artist_id] || []).push(w);
    }

    return {
      artists: artists.map(a => ({ ...a, artworks: artworksByArtist[a.id] || [] }))
    };
  }

  // ──────────────────────────────────────────
  // DATA
  // ──────────────────────────────────────────
  let DATA = { artists: [] };

  // ──────────────────────────────────────────
  // STATE
  // ──────────────────────────────────────────
  const state = {
    filters: { material: 'All', country: 'All', style: 'All' }
  };

  // ──────────────────────────────────────────
  // ROUTING
  // ──────────────────────────────────────────
  function navigate(path) {
    location.hash = '#' + path;
  }

  function handleRoute() {
    const hash  = location.hash || '#/';
    const path  = hash.slice(1);
    const parts = path.split('/').filter(Boolean);

    if (parts[0] === 'artist' && parts[1] && parts[2]) {
      showArtwork(parts[1], parts[2]);
    } else if (parts[0] === 'artist' && parts[1]) {
      showArtist(parts[1]);
    } else {
      showHome();
    }
  }

  function slugify(str) {
    return String(str || '')
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9\s-]/g, '')
      .trim()
      .replace(/[\s_]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  const LOREM_IPSUM = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.';

  window.addEventListener('hashchange', handleRoute);

  window.addEventListener('DOMContentLoaded', async () => {
    try {
      DATA = await loadData();
      handleRoute();
    } catch (err) {
      console.error('Failed to load data from Supabase:', err);
      document.getElementById('view-home').innerHTML =
        '<p style="padding:4rem;font-family:Syne,sans-serif;color:#7A7770;">Could not load sculptor data.</p>';
    }
  });

  // ──────────────────────────────────────────
  // VIEW: HOME
  // ──────────────────────────────────────────
  function showHome() {
    document.getElementById('view-home').classList.remove('hidden');
    document.getElementById('view-artist').classList.add('hidden');
    document.getElementById('view-artwork').classList.add('hidden');
    window.scrollTo({ top: 0 });

    setHomJsonLd();
    const featured = DATA.artists.find(a => a.featured);
    renderHero(featured);
    renderFilters();
    renderGrid();
    renderArtistsList();
  }

  function scrollToArtists() {
    if (!document.getElementById('view-home').classList.contains('hidden')) {
      document.getElementById('artists-section').scrollIntoView({ behavior: 'smooth' });
    } else {
      navigate('/');
      setTimeout(() => document.getElementById('artists-section').scrollIntoView({ behavior: 'smooth' }), 200);
    }
  }

  // ──────────────────────────────────────────
  // HERO
  // ──────────────────────────────────────────
  function renderHero(artist) {
    if (!artist) return;
    const aw = artist.artworks[0];
    document.getElementById('hero-img').src      = aw.image;
    document.getElementById('hero-img').alt      = aw.title;
    document.getElementById('hero-name').textContent     = artist.name;
    document.getElementById('hero-location').textContent = `${artist.city}, ${artist.country}`;

    document.getElementById('hero-tags').innerHTML = artist.tags
      .map(t => `<span class="chip">${t}</span>`)
      .join('');

    document.getElementById('hero-cta').onclick = () => navigate(`/artist/${artist.id}`);
  }

  // ──────────────────────────────────────────
  // FILTERS
  // ──────────────────────────────────────────
  function renderFilters() {
    const all       = getAllArtworks();
    const materials = ['All', ...unique(all.map(a => a.material))];
    const countries = ['All', ...unique(DATA.artists.map(a => a.country))];
    const styles    = ['All', ...unique(all.map(a => a.style))];

    buildPills('filter-material', materials, 'material');
    buildPills('filter-country',  countries, 'country');
    buildPills('filter-style',    styles,    'style');
    updateCount();
  }

  function buildPills(id, options, key) {
    document.getElementById(id).innerHTML = options
      .map(opt => `<button class="pill${state.filters[key] === opt ? ' active' : ''}"
                           onclick="setFilter('${key}','${opt}')">${opt}</button>`)
      .join('');
  }

  function setFilter(key, value) {
    state.filters[key] = value;
    renderFilters();
    renderGrid();
  }

  function updateCount() {
    const n = getFiltered().length;
    document.getElementById('result-count').textContent = `${n} work${n !== 1 ? 's' : ''}`;
  }

  // ──────────────────────────────────────────
  // DATA HELPERS
  // ──────────────────────────────────────────
  function getAllArtworks() {
    return DATA.artists
      .filter(a => a.artworks.length > 0)
      .map(a => ({ ...a.artworks[0], artist: a }));
  }

  function getFiltered() {
    return getAllArtworks().filter(w => {
      if (state.filters.material !== 'All' && w.material  !== state.filters.material)  return false;
      if (state.filters.country  !== 'All' && w.artist.country !== state.filters.country) return false;
      if (state.filters.style    !== 'All' && w.style     !== state.filters.style)     return false;
      return true;
    });
  }

  function unique(arr) { return [...new Set(arr)]; }

  // ──────────────────────────────────────────
  // ARTWORK GRID
  // ──────────────────────────────────────────
  function renderGrid() {
    const works    = getFiltered();
    const grid     = document.getElementById('artwork-grid');
    const noRes    = document.getElementById('no-results');

    if (!works.length) {
      grid.innerHTML = '';
      noRes.classList.remove('hidden');
      return;
    }
    noRes.classList.add('hidden');
    grid.innerHTML = works.map((w, i) => cardHTML(w, i)).join('');
  }

  function cardHTML(w, index) {
    const num   = String(index + 1).padStart(2, '0');
    const isVid = !!w.video;

    const media = isVid
      ? `<video src="${w.video}" poster="${w.image}" muted loop preload="none"
                style="display:block;width:100%;height:auto;transition:transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.5s ease;filter:grayscale(20%);"
                onmouseover="this.play()" onmouseout="this.pause()"></video>`
      : `<img src="${w.image}" alt="${w.title}" loading="lazy" onerror="onImgError(this)"
              style="display:block;width:100%;height:auto;transition:transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.5s ease;filter:grayscale(20%);" />`;

    const videoBadge = isVid ? `
      <div class="video-badge">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span style="font-family:'Syne',sans-serif;font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.8);">Video</span>
      </div>` : '';

    return `
      <div class="masonry-item">
        <div class="artwork-card"
             onclick="navigate('/artist/${w.artist.id}/${slugify(w.title)}')"
             onmouseover="hoverCard(this,true)"
             onmouseout="hoverCard(this,false)">
          <div class="card-index">${num}</div>
          ${videoBadge}
          ${media}
          <div class="artwork-overlay">
            <div style="font-family:'Syne',sans-serif;font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:4px;">
              ${w.artist.name}
            </div>
            <div class="font-display" style="color:white;font-size:1.3rem;font-weight:300;line-height:1.2;margin-bottom:8px;">
              ${w.title}
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-family:'Syne',sans-serif;font-size:0.6rem;color:rgba(255,255,255,0.45);">${w.material}</span>
              <span style="color:rgba(255,255,255,0.25);font-size:0.6rem;">·</span>
              <span style="font-family:'Syne',sans-serif;font-size:0.6rem;color:rgba(255,255,255,0.45);">${w.year}</span>
            </div>
          </div>
        </div>
      </div>`;
  }

  function hoverCard(el, entering) {
    const img = el.querySelector('img');
    if (img) {
      img.style.transform = entering ? 'scale(1.06)' : 'scale(1)';
      img.style.filter    = entering ? 'grayscale(0%)'  : 'grayscale(20%)';
    }
  }

  // ──────────────────────────────────────────
  // ARTISTS LIST
  // ──────────────────────────────────────────
  function renderArtistsList() {
    const n = DATA.artists.length;
    document.getElementById('artists-count').textContent = `— ${n} Artist${n !== 1 ? 's' : ''}`;
    document.getElementById('artists-list').innerHTML = DATA.artists.map((a, i) => `
      <div class="artist-card cursor-pointer" onclick="navigate('/artist/${a.id}')">
        <div style="overflow:hidden;margin-bottom:1rem;aspect-ratio:4/5;">
          <img src="${a.avatar}" alt="${a.name}" class="artist-avatar" loading="lazy" onerror="onImgError(this)" />
        </div>
        <div class="font-display" style="font-size:1.2rem;font-weight:300;margin-bottom:3px;">${a.name}</div>
        <div style="font-family:'Syne',sans-serif;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:#7A7770;margin-bottom:8px;">${a.city}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">
          ${a.tags.map(t => `<span class="chip-dark">${t}</span>`).join('')}
        </div>
      </div>
    `).join('');
  }

  // ──────────────────────────────────────────
  // VIEW: ARTIST
  // ──────────────────────────────────────────
  function showArtist(id) {
    const artist = DATA.artists.find(a => a.id === id);
    if (!artist) { navigate('/'); return; }

    document.getElementById('view-home').classList.add('hidden');
    document.getElementById('view-artist').classList.remove('hidden');
    document.getElementById('view-artwork').classList.add('hidden');
    window.scrollTo({ top: 0 });
    setArtistJsonLd(artist);

    // Hero
    document.getElementById('artist-hero-img').src          = artist.artworks[0].image;
    document.getElementById('artist-hero-img').alt          = artist.name;
    document.getElementById('artist-page-name').textContent     = artist.name;
    document.getElementById('artist-page-location').textContent = `${artist.city}, ${artist.country}`;
    document.getElementById('artist-page-bio').textContent      = artist.bio;
    document.getElementById('artist-work-count').textContent    = String(artist.artworks.length).padStart(2, '0');
    document.getElementById('artist-page-city').textContent     = `${artist.city}, ${artist.country}`;

    // Circular profile avatar + credit
    const avatarEl = document.getElementById('artist-page-avatar');
    const creditEl = document.getElementById('artist-avatar-credit');
    avatarEl.style.display = '';
    creditEl.style.display = 'none';
    if (artist.avatar) {
      avatarEl.src = artist.avatar;
      avatarEl.alt = artist.name;
    } else {
      avatarEl.style.display = 'none';
    }
    if (artist.avatar_credit) {
      document.getElementById('artist-avatar-credit-name').textContent = artist.avatar_credit;
      creditEl.style.display = 'block';
    }

    document.getElementById('artist-page-tags').innerHTML = artist.tags
      .map(t => `<span class="chip">${t}</span>`)
      .join('');

    const mats = unique(artist.artworks.map(a => a.material));
    document.getElementById('artist-materials').innerHTML = mats
      .map(m => `<span class="chip-dark">${m}</span>`)
      .join('');

    // Works grid
    document.getElementById('artist-works-grid').innerHTML =
      artist.artworks.map((w, i) => cardHTML({ ...w, artist }, i)).join('');
  }

  // ──────────────────────────────────────────
  // VIEW: ARTWORK
  // ──────────────────────────────────────────
  function showArtwork(artistId, artworkSlug) {
    const artist = DATA.artists.find(a => a.id === artistId);
    if (!artist) { navigate('/'); return; }

    const artwork = artist.artworks.find(w => slugify(w.title) === artworkSlug);
    if (!artwork) { navigate(`/artist/${artistId}`); return; }

    document.getElementById('view-home').classList.add('hidden');
    document.getElementById('view-artist').classList.add('hidden');
    document.getElementById('view-artwork').classList.remove('hidden');
    window.scrollTo({ top: 0 });
    setArtworkJsonLd(artist, artwork);

    // Hero + gallery
    initArtworkGallery(artwork);

    document.getElementById('artwork-back-btn').onclick = () => navigate(`/artist/${artist.id}`);
    document.getElementById('artwork-back-label').textContent = artist.name;

    document.getElementById('artwork-page-title').textContent = artwork.title;
    document.getElementById('artwork-page-meta').textContent  = `${artist.name} · ${artwork.year}`;

    // Tags — material & technique belong to the artwork, not the artist
    const tags = [artwork.material, artwork.style].filter(Boolean);
    document.getElementById('artwork-page-tags').innerHTML = tags
      .map(t => `<span class="chip">${t}</span>`)
      .join('');

    document.getElementById('artwork-page-description').textContent = artwork.description || LOREM_IPSUM;

    // Artist credit
    document.getElementById('artwork-artist-credit').onclick = () => navigate(`/artist/${artist.id}`);
    const avatarEl = document.getElementById('artwork-artist-avatar');
    if (artist.avatar) {
      avatarEl.src = artist.avatar;
      avatarEl.alt = artist.name;
      avatarEl.style.display = '';
    } else {
      avatarEl.style.display = 'none';
    }
    document.getElementById('artwork-artist-name').textContent = artist.name;

    // Taxonomy infobox
    renderArtworkInfobox(artist, artwork);

    // More by this artist
    document.getElementById('artwork-more-artist-name').textContent = artist.name;
    const others = artist.artworks.filter(w => w.id !== artwork.id);
    document.getElementById('artwork-more-grid').innerHTML =
      others.map((w, i) => cardHTML({ ...w, artist }, i)).join('');
  }

  </script>

</body>
</html>

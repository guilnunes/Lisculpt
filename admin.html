<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lisculpt — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Syne', sans-serif; background: #F2EFE9; color: #0D0D0D; }
    .btn { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:4px; font-size:0.75rem; font-weight:500; letter-spacing:0.08em; cursor:pointer; border:none; transition:opacity 0.15s; }
    .btn:hover { opacity:0.82; }
    .btn-primary   { background:#0D0D0D; color:#F2EFE9; }
    .btn-danger    { background:#b91c1c; color:#fff; }
    .btn-ghost     { background:transparent; color:#0D0D0D; border:1px solid #C8C5BF; }
    .toggle { position:relative; display:inline-block; width:36px; height:20px; }
    .toggle input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:#C8C5BF; border-radius:20px; transition:.2s; cursor:pointer; }
    .slider:before { content:''; position:absolute; width:14px; height:14px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
    input:checked + .slider { background:#0D0D0D; }
    input:checked + .slider:before { transform:translateX(16px); }
    table { border-collapse:collapse; width:100%; }
    th { text-align:left; padding:10px 14px; font-size:0.65rem; letter-spacing:0.14em; text-transform:uppercase; color:#7A7770; border-bottom:1px solid #C8C5BF; white-space:nowrap; }
    td { padding:10px 14px; font-size:0.82rem; border-bottom:1px solid #E8E4DC; vertical-align:middle; }
    tr:hover td { background:#EEEBE5; }
    input[type="text"], input[type="number"], textarea, select { width:100%; padding:7px 10px; border:1px solid #C8C5BF; border-radius:4px; background:#fff; font-size:0.82rem; font-family:inherit; }
    textarea { resize:vertical; min-height:80px; }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:50; display:flex; align-items:center; justify-content:center; }
    .modal { background:#F2EFE9; border-radius:6px; width:min(680px,92vw); max-height:90vh; overflow-y:auto; padding:2rem; }
    .field { margin-bottom:1rem; }
    .field label { display:block; font-size:0.65rem; letter-spacing:0.14em; text-transform:uppercase; color:#7A7770; margin-bottom:4px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    #toast { position:fixed; bottom:1.5rem; right:1.5rem; padding:10px 18px; border-radius:4px; font-size:0.8rem; font-weight:500; opacity:0; transition:opacity 0.2s; pointer-events:none; z-index:100; }
    #toast.show { opacity:1; }
    #toast.ok  { background:#0D0D0D; color:#F2EFE9; }
    #toast.err { background:#b91c1c; color:#fff; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- LOGIN GATE -->
<div id="gate" class="fixed inset-0 flex items-center justify-center bg-[#F2EFE9] z-50">
  <div style="width:320px;">
    <div style="font-size:1.4rem; letter-spacing:0.18em; margin-bottom:1.5rem; font-weight:500;">Lisculpt Admin</div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="gate-pw" placeholder="Enter admin password" style="width:100%;" />
    </div>
    <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="checkPassword()">Enter</button>
    <p id="gate-err" style="color:#b91c1c; font-size:0.75rem; margin-top:8px; display:none;">Incorrect password.</p>
  </div>
</div>

<!-- ADMIN UI -->
<div id="app" class="hidden">

  <!-- Header -->
  <header style="background:#0D0D0D; padding:0 1.5rem; height:52px; display:flex; align-items:center; justify-content:space-between;">
    <span style="color:#F2EFE9; font-size:1rem; letter-spacing:0.2em; font-weight:500;">LISCULPT ADMIN</span>
    <a href="/" style="color:rgba(255,255,255,0.5); font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; text-decoration:none;">← Public Site</a>
  </header>

  <!-- Toolbar -->
  <div style="padding:1.25rem 1.5rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #C8C5BF;">
    <div>
      <span style="font-size:1rem; font-weight:600; letter-spacing:0.08em;">Artists</span>
      <span id="total-count" style="margin-left:8px; font-size:0.75rem; color:#7A7770;"></span>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <input type="text" id="search" placeholder="Search name, country…" style="width:220px;" oninput="renderTable()" />
      <button class="btn btn-primary" onclick="openModal(null)">+ New Artist</button>
    </div>
  </div>

  <!-- Table -->
  <div style="overflow-x:auto; padding:0 1.5rem 4rem;">
    <table>
      <thead>
        <tr>
          <th>Artist</th>
          <th>Country</th>
          <th>City</th>
          <th>Born</th>
          <th>Rating</th>
          <th>Artworks</th>
          <th>Published</th>
          <th>Featured</th>
          <th style="text-align:right;">Actions</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div id="empty" style="display:none; padding:3rem; text-align:center; color:#7A7770; font-size:0.9rem;">No artists found.</div>
  </div>

</div>

<!-- EDIT / CREATE MODAL -->
<div id="modal" class="modal-backdrop hidden" onclick="closeModalOnBackdrop(event)">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
      <h2 id="modal-title" style="font-size:1rem; font-weight:600; letter-spacing:0.08em;"></h2>
      <button onclick="closeModal()" style="background:none; border:none; cursor:pointer; font-size:1.2rem; color:#7A7770;">✕</button>
    </div>

    <form id="artist-form" onsubmit="saveArtist(event)">
      <input type="hidden" id="f-id" />

      <div class="grid2">
        <div class="field">
          <label>Name *</label>
          <input type="text" id="f-name" required />
        </div>
        <div class="field">
          <label>Slug (ID)</label>
          <input type="text" id="f-slug" placeholder="auto-generated" />
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label>Country</label>
          <input type="text" id="f-country" />
        </div>
        <div class="field">
          <label>City</label>
          <input type="text" id="f-city" />
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label>Nationality</label>
          <input type="text" id="f-nationality" />
        </div>
        <div class="field">
          <label>Instagram</label>
          <input type="text" id="f-instagram" placeholder="handle only" />
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label>Birth Year</label>
          <input type="number" id="f-birth-year" min="1800" max="2010" />
        </div>
        <div class="field">
          <label>Death Year</label>
          <input type="number" id="f-death-year" min="1800" max="2030" />
        </div>
      </div>

      <div class="field">
        <label>Bio</label>
        <textarea id="f-bio"></textarea>
      </div>

      <div class="field">
        <label>Avatar URL</label>
        <input type="text" id="f-avatar" />
      </div>

      <div class="grid2">
        <div class="field">
          <label>Tags (comma-separated)</label>
          <input type="text" id="f-tags" placeholder="Figurative, Abstract" />
        </div>
        <div class="field">
          <label>Materials (comma-separated)</label>
          <input type="text" id="f-materials" placeholder="Bronze, Wood" />
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label>Wikidata QID</label>
          <input type="text" id="f-wikidata" placeholder="Q12345" />
        </div>
        <div class="field">
          <label>ULAN ID</label>
          <input type="text" id="f-ulan" />
        </div>
      </div>

      <div style="display:flex; gap:2rem; margin-bottom:1.5rem;">
        <label style="display:flex; align-items:center; gap:8px; font-size:0.82rem; cursor:pointer;">
          <input type="checkbox" id="f-published" /> Published
        </label>
        <label style="display:flex; align-items:center; gap:8px; font-size:0.82rem; cursor:pointer;">
          <input type="checkbox" id="f-featured" /> Featured
        </label>
        <label style="display:flex; align-items:center; gap:8px; font-size:0.82rem; cursor:pointer;">
          <input type="checkbox" id="f-living" /> Living
        </label>
      </div>

      <div class="field">
        <label>Rating (1–10)</label>
        <input type="number" id="f-rating" min="1" max="10" style="width:80px;" />
      </div>

      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:1.5rem; border-top:1px solid #C8C5BF; padding-top:1.25rem;">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div id="confirm-modal" class="modal-backdrop hidden">
  <div class="modal" style="width:min(400px,90vw); max-height:unset;">
    <p style="font-size:0.9rem; margin-bottom:1.5rem;">Delete <strong id="confirm-name"></strong>? This will also remove all their artworks. This cannot be undone.</p>
    <div style="display:flex; justify-content:flex-end; gap:10px;">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const SUPABASE_URL  = 'https://bhkggorcvcpnttbztdod.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoa2dnb3JjdmNwbnR0Ynp0ZG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDk1NzUsImV4cCI6MjA5ODEyNTU3NX0.UHv1ysY33NrIfxkF610TlHL47xcPdieX1F5eSfvsu-M';
  const ADMIN_PASSWORD = 'lisculpt2025';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── Auth gate ──────────────────────────────
  function checkPassword() {
    const pw = document.getElementById('gate-pw').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').classList.remove('hidden');
      loadArtists();
    } else {
      document.getElementById('gate-err').style.display = 'block';
    }
  }
  document.getElementById('gate-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  // ── Data ──────────────────────────────────
  let ARTISTS = [];
  let artworkCounts = {};
  let pendingDeleteId = null;

  async function loadArtists() {
    const { data: artists, error } = await sb
      .from('artists')
      .select('*')
      .order('rating', { ascending: false });
    if (error) { toast('Failed to load artists', true); return; }

    const { data: counts } = await sb
      .from('artworks')
      .select('artist_id');
    artworkCounts = {};
    (counts || []).forEach(r => {
      artworkCounts[r.artist_id] = (artworkCounts[r.artist_id] || 0) + 1;
    });

    ARTISTS = artists;
    document.getElementById('total-count').textContent = `${artists.length} artists`;
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = ARTISTS.filter(a =>
      !q ||
      a.name.toLowerCase().includes(q) ||
      (a.country || '').toLowerCase().includes(q) ||
      (a.city || '').toLowerCase().includes(q)
    );

    const tbody = document.getElementById('table-body');
    const empty = document.getElementById('empty');

    if (!filtered.length) {
      tbody.innerHTML = '';
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = filtered.map(a => `
      <tr>
        <td>
          <div style="font-weight:500;">${a.name}</div>
          <div style="font-size:0.7rem; color:#7A7770; margin-top:2px;">${a.id}</div>
        </td>
        <td>${a.country || '—'}</td>
        <td>${a.city || '—'}</td>
        <td>${a.birth_year || '—'}</td>
        <td>${a.rating ?? '—'}</td>
        <td style="text-align:center;">${artworkCounts[a.id] || 0}</td>
        <td>
          <label class="toggle" title="${a.published ? 'Published — click to unpublish' : 'Unpublished — click to publish'}">
            <input type="checkbox" ${a.published ? 'checked' : ''} onchange="togglePublished('${a.id}', this.checked)" />
            <span class="slider"></span>
          </label>
        </td>
        <td>
          <label class="toggle" title="${a.featured ? 'Featured' : 'Not featured'}">
            <input type="checkbox" ${a.featured ? 'checked' : ''} onchange="toggleFeatured('${a.id}', this.checked)" />
            <span class="slider"></span>
          </label>
        </td>
        <td style="text-align:right; white-space:nowrap;">
          <button class="btn btn-ghost" onclick="openModal('${a.id}')">Edit</button>
          <button class="btn btn-danger" style="margin-left:6px;" onclick="openConfirm('${a.id}')">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  // ── Toggles ───────────────────────────────
  async function togglePublished(id, val) {
    const { error } = await sb.from('artists').update({ published: val }).eq('id', id);
    if (error) { toast('Update failed', true); return; }
    const a = ARTISTS.find(x => x.id === id);
    if (a) a.published = val;
    toast(val ? 'Artist published' : 'Artist unpublished');
  }

  async function toggleFeatured(id, val) {
    const { error } = await sb.from('artists').update({ featured: val }).eq('id', id);
    if (error) { toast('Update failed', true); return; }
    const a = ARTISTS.find(x => x.id === id);
    if (a) a.featured = val;
    toast(val ? 'Set as featured' : 'Removed from featured');
  }

  // ── Modal ─────────────────────────────────
  function openModal(id) {
    const a = id ? ARTISTS.find(x => x.id === id) : null;
    document.getElementById('modal-title').textContent = a ? `Edit — ${a.name}` : 'New Artist';
    document.getElementById('f-id').value          = a ? a.id : '';
    document.getElementById('f-name').value        = a ? a.name : '';
    document.getElementById('f-slug').value        = a ? a.id : '';
    document.getElementById('f-country').value     = a ? (a.country || '') : '';
    document.getElementById('f-city').value        = a ? (a.city || '') : '';
    document.getElementById('f-nationality').value = a ? (a.nationality || '') : '';
    document.getElementById('f-instagram').value   = a ? (a.instagram || '') : '';
    document.getElementById('f-birth-year').value  = a ? (a.birth_year || '') : '';
    document.getElementById('f-death-year').value  = a ? (a.death_year || '') : '';
    document.getElementById('f-bio').value         = a ? (a.bio || '') : '';
    document.getElementById('f-avatar').value      = a ? (a.avatar || '') : '';
    document.getElementById('f-tags').value        = a ? (a.tags || []).join(', ') : '';
    document.getElementById('f-materials').value   = a ? (a.materials || []).join(', ') : '';
    document.getElementById('f-wikidata').value    = a ? (a.wikidata_qid || '') : '';
    document.getElementById('f-ulan').value        = a ? (a.ulan_id || '') : '';
    document.getElementById('f-published').checked = a ? !!a.published : true;
    document.getElementById('f-featured').checked  = a ? !!a.featured : false;
    document.getElementById('f-living').checked    = a ? !!a.living : true;
    document.getElementById('f-rating').value      = a ? (a.rating || '') : '';
    document.getElementById('modal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
  }

  function closeModalOnBackdrop(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function slugify(str) {
    return str.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-z0-9\s-]/g, '')
      .trim().replace(/[\s_]+/g, '-');
  }

  function parseCSV(str) {
    return str.split(',').map(s => s.trim()).filter(Boolean);
  }

  async function saveArtist(e) {
    e.preventDefault();
    const isNew = !document.getElementById('f-id').value;
    const name  = document.getElementById('f-name').value.trim();
    const id    = document.getElementById('f-slug').value.trim() || slugify(name);

    const payload = {
      id,
      name,
      country:      document.getElementById('f-country').value.trim() || null,
      city:         document.getElementById('f-city').value.trim() || null,
      nationality:  document.getElementById('f-nationality').value.trim() || null,
      instagram:    document.getElementById('f-instagram').value.trim() || null,
      birth_year:   parseInt(document.getElementById('f-birth-year').value) || null,
      death_year:   parseInt(document.getElementById('f-death-year').value) || null,
      bio:          document.getElementById('f-bio').value.trim() || null,
      avatar:       document.getElementById('f-avatar').value.trim() || null,
      tags:         parseCSV(document.getElementById('f-tags').value),
      materials:    parseCSV(document.getElementById('f-materials').value),
      wikidata_qid: document.getElementById('f-wikidata').value.trim() || null,
      ulan_id:      document.getElementById('f-ulan').value.trim() || null,
      published:    document.getElementById('f-published').checked,
      featured:     document.getElementById('f-featured').checked,
      living:       document.getElementById('f-living').checked,
      rating:       parseInt(document.getElementById('f-rating').value) || null,
    };

    const btn = document.getElementById('save-btn');
    btn.textContent = 'Saving…';
    btn.disabled = true;

    let error;
    if (isNew) {
      ({ error } = await sb.from('artists').insert(payload));
    } else {
      ({ error } = await sb.from('artists').update(payload).eq('id', document.getElementById('f-id').value));
    }

    btn.textContent = 'Save';
    btn.disabled = false;

    if (error) { toast('Save failed: ' + error.message, true); return; }

    toast(isNew ? 'Artist created' : 'Artist updated');
    closeModal();
    loadArtists();
  }

  // ── Delete ────────────────────────────────
  function openConfirm(id) {
    pendingDeleteId = id;
    const a = ARTISTS.find(x => x.id === id);
    document.getElementById('confirm-name').textContent = a ? a.name : id;
    document.getElementById('confirm-modal').classList.remove('hidden');
  }

  function closeConfirm() {
    pendingDeleteId = null;
    document.getElementById('confirm-modal').classList.add('hidden');
  }

  async function confirmDelete() {
    if (!pendingDeleteId) return;
    const { error } = await sb.from('artists').delete().eq('id', pendingDeleteId);
    closeConfirm();
    if (error) { toast('Delete failed: ' + error.message, true); return; }
    toast('Artist deleted');
    loadArtists();
  }

  // ── Toast ─────────────────────────────────
  let toastTimer;
  function toast(msg, isErr = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + (isErr ? 'err' : 'ok');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }
</script>
</body>
</html>
